name: Checks

on:
  push:
    branches: [master]
  pull_request:

jobs:
  checks:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3.0"
      - uses: jdx/mise-action@v4
      - run: make lint
      - run: make build
        env:
          TUIST_CODE_SIGNING_ALLOWED: "NO"
          TUIST_CODE_SIGNING_REQUIRED: "NO"
          TUIST_CODE_SIGN_IDENTITY: ""
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs
          path: |
            ~/.local/state/tuist/sessions/**/logs.txt
            ~/.cache/tuist/Runs/**
            .build/derived/Logs/**
          if-no-files-found: ignore
